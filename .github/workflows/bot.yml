name: Tailscale Password Host
on: workflow_dispatch

jobs:
  host:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Connect Tailscale
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: Set Password & Enable SSH
        env:
          RPASS: ${{ secrets.RUNNER_PASSWORD }}
        run: |
          # 1. Set the password for the 'runner' user
          echo "runner:$RPASS" | sudo chpasswd
          
          # 2. Configure SSH to allow password login
          sudo sed -i 's/PasswordAuthentication no/PasswordAuthentication yes/' /etc/ssh/sshd_config
          sudo systemctl restart ssh
          
          # 3. Tell Tailscale to allow SSH
          sudo tailscale set --ssh
          
          echo "Ready! Use your password to connect."
          sleep 6h
