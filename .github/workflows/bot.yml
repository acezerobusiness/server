name: Cloudflare Bot Host
on: workflow_dispatch

jobs:
  host:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Python & Screen Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip xvfb
          pip install roblox requests

      - name: Start Cloudflare Tunnel
        run: |
          # Download the Cloudflare Tunnel tool
          curl -L --output cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb
          
          # Start a "Quick Tunnel" (Free & No Login Required)
          # This will give you a temporary URL in the logs
          cloudflared tunnel --url http://localhost:8080 &
          
          # Start a web-based terminal on port 8080
          # This allows you to see the "screen" in your browser
          docker run -p 8080:7681 -d tsl0922/ttyd bash
          
          echo "Look for the 'cloudflare.com' link in the logs below!"
          sleep 6h
