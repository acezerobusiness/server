name: Visual Web Display
on: workflow_dispatch

jobs:
  display:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Desktop & Viewers
        run: |
          sudo apt-get update
          # Install a lightweight desktop and the web-viewing tools
          sudo apt-get install -y xfce4 xfce4-goodies tightvncserver novnc python3-websockify
          
          # Install Ngrok
          curl -s https://ngrok-agent.s3.amazonaws.com/ngrok.asc | sudo tee /etc/apt/trusted.gpg.d/ngrok.asc >/dev/null
          echo "deb https://ngrok-agent.s3.amazonaws.com buster main" | sudo tee /etc/apt/sources.list.d/ngrok.list
          sudo apt-get update && sudo apt-get install ngrok

      - name: Launch Display
        env:
          NGROK_TOKEN: ${{ secrets.NGROK_AUTH_TOKEN }}
        run: |
          # 1. Start the Virtual Desktop (Password: 'gully')
          mkdir -p ~/.vnc
          echo "gully" | vncpasswd -f > ~/.vnc/passwd
          chmod 600 ~/.vnc/passwd
          vncserver :1 -geometry 1280x720 -depth 24
          
          # 2. Bridge the Desktop to Web (Port 8080)
          /usr/share/novnc/utils/launch.sh --vnc localhost:5901 --listen 8080 &
          
          # 3. Open the Ngrok Tunnel
          ngrok config add-authtoken $NGROK_TOKEN
          echo "OPEN THE LINK BELOW IN YOUR BROWSER"
          ngrok http 8080
