name: Secure Bot Host
on: workflow_dispatch

jobs:
  host:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Connect to My Private Network
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: Install Python & Roblox
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip xvfb
          pip install roblox requests

      - name: Wait for You to Connect
        run: sleep 6h
